<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis — Write Letter</title>
  <style>
    :root { --primary:#00bfff; --bg:#1e2736; --card:rgba(30,39,52,0.9); --border:#384459; --text:#e0e0e0; --muted:#999; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
    .hero { text-align:center; padding:30px 0; background:linear-gradient(120deg,#30384d,var(--bg)); border-bottom:2px solid var(--primary); }
    .hero h1 { font-size:2.2rem; color:var(--primary); text-shadow:0 0 10px var(--primary); }
    .hero p  { color:var(--muted); margin-top:8px; }
    main { max-width:780px; margin:30px auto; padding:0 20px 40px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:28px; margin-bottom:24px; box-shadow:0 4px 16px rgba(0,0,0,0.5); }
    .card h2 { color:var(--primary); font-size:1.2rem; margin-bottom:18px; border-bottom:1px solid var(--border); padding-bottom:8px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width: 600px) {
        .grid-2 { grid-template-columns: 1fr; }
    }
    .field { margin-bottom:16px; }
    label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:5px; }
    input, textarea, select {
      width:100%; padding:9px 12px; background:#131a24; border:1px solid var(--border);
      border-radius:5px; color:var(--text); font-size:0.95rem;
    }
    input:focus, textarea:focus, select:focus { border-color:var(--primary); outline:none; box-shadow:0 0 6px rgba(0,191,255,0.3); }
    textarea { resize:vertical; }
    .hint { font-size:0.75rem; color:var(--muted); margin-top:4px; }
    .btn-submit { width:100%; padding:14px; background:transparent; border:2px solid var(--primary); color:var(--primary); border-radius:8px; font-size:1.1rem; cursor:pointer; transition:all .25s; letter-spacing:1px; }
    .btn-submit:hover { background:var(--primary); color:var(--bg); box-shadow:0 0 16px rgba(0,191,255,0.5); }
    footer { text-align:center; color:var(--muted); font-size:0.8rem; padding:20px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Write Letter</h1>
    <p>Ekillib Services, LLC — Powered by Jarvis</p>
  </div>

  <main>
    <form method="POST" action="/documents/letter/generate" target="_blank">

      <!-- Recipient -->
      <div class="card">
        <h2>Recipient</h2>
        <div class="grid-2">
          <div class="field">
            <label>Recipient Name *</label>
            <input type="text" name="recipient_name" required placeholder="Full name or company">
          </div>
          <div class="field">
            <label>Salutation *</label>
            <input type="text" name="salutation" value="Sir/Madam" required placeholder="e.g. Mr. Smith, Sir/Madam">
          </div>
        </div>
        <div class="field">
          <label>Recipient Address</label>
          <textarea name="recipient_address" rows="2" placeholder="Street, City, State ZIP"></textarea>
        </div>
      </div>

      <!-- Letter Content -->
      <div class="card">
        <h2>Letter Content</h2>
        <div class="field">
          <label>Subject *</label>
          <input type="text" name="subject" required placeholder="Re: Invoice #123, Service Agreement...">
        </div>
        <div class="field">
          <label>Body *</label>
          <textarea name="body" rows="10" required
            placeholder="Write the body of your letter here.

Separate paragraphs with a blank line — each blank line creates a new paragraph in the final document.

Thank you for your business."></textarea>
          <p class="hint">Tip: Leave a blank line between paragraphs — each becomes a separate paragraph in the letter.</p>
        </div>
      </div>

      <!-- Closing -->
      <div class="card">
        <h2>Closing</h2>
        <div class="grid-2">
          <div class="field">
            <label>Closing Phrase</label>
            <select name="closing">
              <option value="Sincerely">Sincerely</option>
              <option value="Best Regards">Best Regards</option>
              <option value="Respectfully">Respectfully</option>
              <option value="Thank you">Thank you</option>
              <option value="Yours truly">Yours truly</option>
            </select>
          </div>
          <div class="field">
            <label>Signature</label>
            <input type="text" name="signature" value="Your Name">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit">Generate Letter →</button>
    </form>
  </main>

  <footer>&copy; 2026 Jarvis AI - Engineered by Ekimtech.com</footer>
</body>
</html>
